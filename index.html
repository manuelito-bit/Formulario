<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel</title>
</head>
<body>
    <h1>Formulario de contacto</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>Datos personales:</legend>
            <label for="Nombre">Nombre:</label>
            <input id="nombre" name="nombre" type="text" required>
            <br><br>

            <label for="correo">Correo:</label>
            <input type="email" id="correo" name="Correo" required>
            <br><br>

            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="Edad" min="18" max="60" requiered>
        </fieldset>
        <fieldset>
            <legend>Genero</legend>
            <input type="radio" id="f" name="Genero" value="femenino">
            <label for="f">femenino</label>
        </fieldset>
        <fieldset>
            <input type="radio" id="m" name="Genero" value="masculino">
            <label for="m">masculino</label>
        </fieldset>
        <fieldset>
            <legend>Tu opinion es importante para nosotros</legend>
            <label for="comentarios">comentarios</label> <br>
            <textarea name="comentarios" id="comentarios" cols="30" rows="6"></textarea>
        </fieldset>
        <br>
        <button type="submit">Enviar</button>
        <button type="reset">Borrar</button>

    </form>
</body>
</html>
